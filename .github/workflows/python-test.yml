name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install email-validator>=2.2.0
        pip install eventlet>=0.40.2
        pip install flask-socketio>=5.5.1
        pip install flask>=3.1.1
        pip install flask-sqlalchemy>=3.1.1
        pip install gunicorn>=23.0.0
        pip install numpy>=2.3.2
        pip install pandas>=2.3.1
        pip install psycopg2-binary>=2.9.10
        pip install requests>=2.32.4
        pip install sqlalchemy>=2.0.43
        pip install werkzeug>=3.1.3
        pip install pytest pytest-cov flake8
      continue-on-error: false
    
    - name: Note about MetaTrader5
      run: |
        echo "MetaTrader5 is Windows-only and skipped in CI"
        echo "Install manually on Windows: pip install MetaTrader5>=5.0.45"
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Run pytest tests
      run: |
        pytest tests/ -v --tb=short
      continue-on-error: false
    
    - name: Test imports
      run: |
        python -c "import flask; print('Flask OK')"
        python -c "import pandas; print('Pandas OK')"
        python -c "import numpy; print('NumPy OK')"
      continue-on-error: true
